    <!-- LCP: Critical CSS inline for fastest rendering -->
    <style>
      /* Critical path CSS for LCP */
      body { 
        margin: 0; 
        font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        font-display: swap;
        background: linear-gradient(135deg, rgb(248 250 252) 0%, rgb(224 231 255) 50%, rgb(237 233 254) 100%);
        min-height: 100vh;
        line-height: 1.5;
      }
      
      /* LCP: Prevent layout shift for images */
      img {
        max-width: 100%;
        height: auto;
        content-visibility: auto;
      }
      
      /* LCP: Hero images get priority */
      img[fetchpriority="high"] {
        content-visibility: visible;
      }
      
      /* Reserve space for floating elements */
      .floating-button-space {
        height: 80px;
        width: 100%;
      }
      
      /* LCP: Optimize rendering performance */
      .contain-layout {
        contain: layout style paint;
      }
      
      /* Avatar optimization */
      .avatar-container {
        width: 100%;
        aspect-ratio: 1;
        contain: layout;
      }
      
      /* LCP: Initial viewport gets priority */
      .hero-section {
        min-height: 400px;
        contain: layout style;
      }
      
      /* Optimize initial render */
      #root {
        isolation: isolate;
      }
      
      /* Loading skeleton - composited animation for performance */
      .loading-skeleton {
        background: #f0f0f0;
        border-radius: 8px;
        contain: layout paint;
        position: relative;
        overflow: hidden;
      }
      .loading-skeleton::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(90deg, transparent 0%, #e0e0e0 50%, transparent 100%);
        animation: loading 1.5s infinite;
        will-change: transform;
      }
      
      @keyframes loading {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(100%); }
      }
      
      /* Hide skeleton when app loads */
      .loading-skeleton.hide {
        display: none;
      }
    </style>
